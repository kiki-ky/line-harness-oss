name: Deploy Admin Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-admin.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel Redeploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Find latest successful deployment
          LATEST=$(curl -s "https://api.vercel.com/v6/deployments?projectId=prj_TZkQGwPmvKI5qf7iFk2L26Y42SA9&teamId=team_fJdovYrWEmYhpN4q6gE0AaSO&limit=5&state=READY&target=production" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.deployments[0].uid')

          echo "Redeploying from: $LATEST"

          # Trigger redeploy
          RESULT=$(curl -s -X POST "https://api.vercel.com/v13/deployments?teamId=team_fJdovYrWEmYhpN4q6gE0AaSO" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"with-kosen-line-admin\",\"deploymentId\":\"$LATEST\",\"target\":\"production\"}")

          echo "$RESULT" | jq '{id: .id, url: .url, readyState: .readyState}'
